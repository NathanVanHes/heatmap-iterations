<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session Start - Noon Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box}
:root{
  --bg:#F8F5EF;
  --bg-raised:#FFFFFF;
  --fg:#141414;
  --fg-secondary:#74716C;
  --fg-muted:#BBB8B1;
  --green:#27BD86;
  --gold:#FFCB45;
  --red:#F03D3D;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'Inter',system-ui,sans-serif;
  --r:8px;
}
body{background:var(--bg);margin:0;font-family:var(--font-sans);color:var(--fg);min-height:100vh}
.page{max-width:480px;margin:0 auto;padding:32px 24px}
.section{margin-bottom:28px;opacity:0;transform:translateY(6px);animation:cardIn 0.35s ease forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

.topic{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(20,20,20,0.06)}
.topic:last-child{border-bottom:0}
.topic__tile{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none;position:relative;overflow:hidden}
.topic__tile-score{font-family:var(--font-mono);font-size:14px;font-weight:700;color:rgba(0,0,0,0.35)}
.topic__tile.is-mastered::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.15;background:repeating-linear-gradient(135deg,transparent,transparent 5px,rgba(0,0,0,0.4) 5px,rgba(0,0,0,0.4) 6.5px);border-radius:inherit}
.topic__info{flex:1;min-width:0}
.topic__name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topic__sub{font-size:12px;color:var(--fg-secondary);margin-top:2px;font-family:var(--font-mono);display:flex;align-items:center;gap:3px}

.gbar{position:relative;margin-top:10px}
.gbar__track{width:100%;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
.gbar__pos{position:absolute;top:0;transform:translate(-50%,-25%);width:14px;height:14px;border-radius:50%;border:2.5px solid var(--bg);box-shadow:0 0 0 1px rgba(20,20,20,0.15),0 1px 3px rgba(0,0,0,0.15);transition:left 0.8s cubic-bezier(0.22,0.61,0.36,1)}
.gbar__target{position:absolute;top:0;height:8px;width:2px;background:var(--fg);border-radius:1px;opacity:0.2}
.gbar__labels{display:flex;margin-top:6px;position:relative}
.gbar__labels span{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}
.gbar__mastery-label{position:absolute;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--fg-secondary);display:flex;align-items:center;gap:2px}
</style>
</head>
<body>
<div class="page">
  <div id="content"></div>
</div>

<script>
var starInline = '<svg width="10" height="10" viewBox="0 0 12 12" fill="#141414" style="vertical-align:-1px"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>';
var starSvg14 = '<svg width="14" height="14" viewBox="0 0 12 12" fill="#141414"><path d="M6 0.5L7.5 4.2L11.5 4.6L8.5 7.2L9.3 11.2L6 9.3L2.7 11.2L3.5 7.2L0.5 4.6L4.5 4.2Z"/></svg>';
var mastery = 80;

function scoreColor(s) {
  var t = Math.max(0, Math.min(100, s)) / 100;
  var r, g, b;
  if (t < 0.5) { var p = t / 0.5; r = 240+(255-240)*p; g = 61+(203-61)*p; b = 61+(69-61)*p; }
  else { var p = (t-0.5)/0.5; r = 255+(39-255)*p; g = 203+(189-203)*p; b = 69+(134-69)*p; }
  return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
}

function renderTopicWithBar(t) {
  var col = scoreColor(t.score);
  var gap = mastery - t.score;
  var isMastered = t.score >= mastery;

  var h = '<div class="topic">';

  if (isMastered) {
    h += '<div class="topic__tile is-mastered" style="background:' + col + '">' + starSvg14 + '</div>';
  } else {
    h += '<div class="topic__tile" style="background:' + col + '"><span class="topic__tile-score">' + t.score + '</span></div>';
  }

  h += '<div class="topic__info">';
  h += '<div class="topic__name">' + t.name + '</div>';

  if (isMastered) {
    h += '<div class="topic__sub">' + starInline + ' Mastered</div>';
  } else {
    h += '<div class="topic__sub">Reach ' + starInline + ' 80+ (' + gap + ' remaining)</div>';
  }

  // Gradient bar
  h += '<div class="gbar">';
  h += '<div class="gbar__track"></div>';
  h += '<div class="gbar__pos" style="left:' + t.score + '%;background:' + col + '"></div>';

  if (!isMastered) {
    h += '<div class="gbar__target" style="left:' + mastery + '%"></div>';
    h += '<div class="gbar__labels">';
    h += '<span class="gbar__mastery-label" style="left:' + mastery + '%">' + starInline + ' ' + mastery + '</span>';
    h += '</div>';
  }

  h += '</div>';
  h += '</div></div>';
  return h;
}

var topics = [
  { name: 'المستقيمات', score: 18 },
  { name: 'القوى', score: 35 },
  { name: 'الاعداد و خصائصها', score: 72 },
  { name: 'النسبة والتناسب', score: 78 },
  { name: 'الإحصاء', score: 94 },
];

var h = '';
topics.forEach(function(t, i) {
  h += '<div class="section" style="animation-delay:' + (i * 80) + 'ms">';
  h += renderTopicWithBar(t);
  h += '</div>';
});

document.getElementById('content').innerHTML = h;
</script>
</body>
</html>
